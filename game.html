<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TlapKing 3.0</title>

<link rel="stylesheet" href="css/game.css">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="page">

  <main>

    <div class="hero">
      <img src="assets/tlapking.png" class="tlapking-logo">
      <div class="back-wrapper">
        <a href="/Kocicy-pracky/index.html" class="back-btn">← ZPĚT NA WEB</a>
      </div>
    </div>

    <section>

      <div class="game-info">
        <div class="stat-box">🐾 Skóre: <strong id="score">0</strong></div>
        <div class="stat-box">❤️ Životy: <strong id="lives">3</strong></div>
      </div>

      <div style="text-align:center;margin:15px 0;">
        <button class="liga-btn primary" onclick="startGame()">SPUSTIT LOV</button>
      </div>

      <div id="gameArea">
        <div id="buffStatus" class="buff-status hidden"></div>
      </div>

      <div id="gameOver" class="hidden game-over">
        <h3>Konec hry</h3>
        <p>Tvé skóre: <span id="finalScore"></span></p>
      </div>

    </section>

  </main>

</div>

<script src="js/game.js"></script>
</body>

</html>
